<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Caisse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0e;--bg2:#131316;--bg3:#1c1c21;--bg4:#252530;
  --sur:rgba(255,255,255,.05);--sur2:rgba(255,255,255,.09);
  --bdr:rgba(255,255,255,.09);--bdr2:rgba(255,255,255,.16);
  --txt:#f0eee9;--txt2:#8a8a9a;--txt3:#46465a;
  --acc:#FF6B35;--grn:#34D399;--red:#F87171;--amb:#FBBF24;--blu:#60A5FA;--pur:#A78BFA;
  --spr:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.4,0,.2,1);
  --r-sm:12px;--r-md:16px;--r-lg:20px;--r-xl:24px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,16px);
}
[data-theme="light"]{
  --bg:#f5f5f7;--bg2:#fff;--bg3:#f0f0f4;--bg4:#e8e8ee;
  --sur:rgba(0,0,0,.04);--sur2:rgba(0,0,0,.07);
  --bdr:rgba(0,0,0,.09);--bdr2:rgba(0,0,0,.16);
  --txt:#111118;--txt2:#555568;--txt3:#aaaabc;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-text-size-adjust:100%;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--txt);height:100dvh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;}

/* TOAST */
#toast{position:fixed;top:calc(var(--safe-t) + 14px);left:50%;transform:translateX(-50%) translateY(-60px);background:var(--bg3);border:1px solid var(--bdr2);border-radius:30px;padding:9px 20px;font-size:13px;font-weight:700;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 4px 24px rgba(0,0,0,.5);transition:transform .4s var(--spr);pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.saved{color:var(--grn);}#toast.error{color:var(--red);}

/* HEADER */
.hdr{display:flex;align-items:center;gap:8px;padding:calc(var(--safe-t) + 12px) 14px 12px;background:rgba(12,12,14,.88);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:60;position:relative;}
[data-theme="light"] .hdr{background:rgba(245,245,247,.92);}
.hdr::after{content:'';position:absolute;bottom:-1px;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.35;}
.logo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;letter-spacing:1px;flex:1;}
.logo em{color:var(--acc);font-style:normal;}
.hbtn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:30px;border:1px solid var(--bdr2);background:var(--sur);color:var(--txt2);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;position:relative;transition:background .2s,color .2s,transform .18s var(--spr),border-color .2s;-webkit-tap-highlight-color:transparent;}
.hbtn:active{transform:scale(.87);}
.hbtn.on-j{background:color-mix(in srgb,var(--pur) 18%,var(--bg3));border-color:var(--pur);color:var(--pur);}
.hbtn.on-s{background:color-mix(in srgb,var(--acc) 18%,var(--bg3));border-color:var(--acc);color:var(--acc);}
.hdot{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:16px;height:16px;border-radius:8px;padding:0 4px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);transform:scale(0);transition:transform .3s var(--spr);}
.hdot.on{transform:scale(1);}

/* VIEWS */
.view{display:none;flex:1;overflow:hidden;opacity:0;transition:opacity .22s var(--ease);}
.view.active{display:flex;animation:viewIn .22s var(--ease) forwards;}
@keyframes viewIn{from{opacity:0;}to{opacity:1;}}
#mv{flex-direction:row;}

/* SIDEBAR */
.sb{width:74px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:6px 0 var(--safe-b);gap:2px;}
.sb::-webkit-scrollbar{display:none;}
.stab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 6px;cursor:pointer;position:relative;border-radius:var(--r-sm);margin:0 5px;transition:background .22s var(--ease),transform .2s var(--spr);-webkit-tap-highlight-color:transparent;overflow:hidden;}
.stab::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;border-radius:0 3px 3px 0;background:var(--c,var(--acc));transform:scaleY(0) translateX(-2px);transition:transform .25s var(--spr),opacity .2s;opacity:0;}
.stab.on{background:color-mix(in srgb,var(--c,var(--acc)) 12%,var(--bg2));}
.stab.on::before{transform:scaleY(1) translateX(0);opacity:1;}
.stab:active{transform:scale(.82);}
.stab-em{font-size:26px;line-height:1;transition:transform .25s var(--spr);}
.stab.on .stab-em{transform:scale(1.18);}
.stab-lbl{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--txt3);line-height:1.3;text-align:center;max-width:62px;transition:color .2s;}
.stab.on .stab-lbl{color:var(--c,var(--acc));}
.stab-pip{width:5px;height:5px;border-radius:50%;background:var(--c,var(--acc));margin-top:1px;transform:scale(0);opacity:0;transition:transform .25s var(--spr),opacity .2s;}
.stab.cart .stab-pip{transform:scale(1);opacity:1;}

/* MENU AREA */
.ma{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);position:relative;}
.mscroll{flex:1;overflow-y:auto;padding:12px 12px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.mscroll::-webkit-scrollbar{display:none;}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-bar{width:3px;height:18px;border-radius:2px;background:var(--c,var(--acc));flex-shrink:0;}
.sec-txt{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);}

/* ITEM GRID */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.icard{position:relative;border-radius:var(--r-lg);padding:16px 10px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;overflow:hidden;border:1.5px solid var(--bd,var(--bdr));background:var(--ibg,var(--bg3));min-height:100px;text-align:center;transition:transform .2s var(--spr),border-color .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent;will-change:transform;}
.icard::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--glow,transparent) 0%,transparent 70%);opacity:.7;pointer-events:none;}
.icard:active{transform:scale(.88);}
.icard.sel{border-color:var(--ac,var(--acc));box-shadow:0 0 0 1px color-mix(in srgb,var(--ac,var(--acc)) 35%,transparent),inset 0 0 20px color-mix(in srgb,var(--ac,var(--acc)) 8%,transparent);}
.icard-em{font-size:30px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));transition:transform .2s var(--spr);}
.icard.sel .icard-em{transform:scale(1.1);}
.icard-name{font-size:13px;font-weight:700;color:var(--txt);line-height:1.3;}
.icard-price{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--ac,var(--acc));}
.icard-qty{position:absolute;top:8px;right:8px;background:var(--ac,var(--acc));color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center;animation:popIn .25s var(--spr);}
@keyframes popIn{0%{transform:scale(0);}100%{transform:scale(1);}}

/* PICKER MODAL (fullscreen bottom sheet) */
.picker-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;pointer-events:all;animation:fadeInOvl .22s var(--ease);}
@keyframes fadeInOvl{from{background:rgba(0,0,0,0);}to{background:rgba(0,0,0,.72);}}
.picker-sheet{background:var(--bg3);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:430px;max-height:92dvh;display:flex;flex-direction:column;border:1px solid var(--bdr2);border-bottom:none;box-shadow:0 -20px 60px rgba(0,0,0,.7);animation:slideUpSheet .32s var(--spr);}
@keyframes slideUpSheet{from{transform:translateY(100%);}to{transform:translateY(0);}}
.picker-drag{text-align:center;padding:10px 0 4px;flex-shrink:0;}
.picker-drag-bar{display:inline-block;width:36px;height:4px;border-radius:2px;background:var(--bdr2);}
.picker-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 18px 12px;flex-shrink:0;}
.picker-title{font-size:18px;font-weight:900;letter-spacing:-.3px;flex:1;}
.picker-close{width:30px;height:30px;border-radius:50%;background:var(--sur2);border:1px solid var(--bdr);color:var(--txt2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s var(--spr);-webkit-tap-highlight-color:transparent;}
.picker-back{width:30px;height:30px;border-radius:50%;background:var(--sur2);border:1px solid var(--bdr);color:var(--txt2);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s var(--spr);-webkit-tap-highlight-color:transparent;}
.picker-back:active{transform:scale(.82);}
.picker-close:active{transform:scale(.82);}
.picker-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:0 18px;scrollbar-width:none;}
.picker-body::-webkit-scrollbar{display:none;}
.picker-footer{padding:12px 18px calc(var(--safe-b) + 4px);flex-shrink:0;border-top:1px solid var(--bdr);}
.ipicker-q{font-size:16px;font-weight:800;text-align:center;margin-bottom:4px;color:var(--txt);}
.ipicker-q span{color:var(--acc);}
.ipicker-sub{font-size:12px;text-align:center;color:var(--txt2);margin-bottom:14px;}
.ipicker-prices{display:flex;gap:10px;margin-bottom:14px;}
.ipicker-price-card{flex:1;border-radius:var(--r-md);padding:12px;text-align:center;border:1.5px solid var(--bdr2);background:var(--sur);}
.ipicker-price-lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--txt2);margin-bottom:4px;}
.ipicker-price-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;}
.ipicker-btns{display:flex;gap:10px;margin-bottom:4px;}
.ipb{flex:1;padding:16px;border-radius:var(--r-md);border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:transform .18s var(--spr);-webkit-tap-highlight-color:transparent;}
.ipb:active{transform:scale(.9);}
.ipb-yes{background:linear-gradient(135deg,#34D399,#059669);color:#fff;box-shadow:0 4px 16px rgba(52,211,153,.3);}
.ipb-no{background:linear-gradient(135deg,#F87171,#DC2626);color:#fff;box-shadow:0 4px 16px rgba(248,113,113,.3);}
.mlbl{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt2);margin-bottom:6px;}
.ipicker-supp-q{font-size:14px;font-weight:800;text-align:center;margin-top:14px;margin-bottom:2px;padding-top:14px;border-top:1px solid var(--bdr);color:var(--txt);}

/* SAUCE GRID (carrés) */
.sauce-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px;}
.sauce-sq{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:var(--r-md);border:1.5px solid var(--bdr2);background:var(--sur);padding:10px 4px;cursor:pointer;transition:all .18s var(--spr);-webkit-tap-highlight-color:transparent;min-height:64px;text-align:center;}
.sauce-sq:active{transform:scale(.88);}
.sauce-sq.on{border-color:var(--ac,var(--acc));background:color-mix(in srgb,var(--ac,var(--acc)) 22%,var(--bg3));box-shadow:0 0 0 2px color-mix(in srgb,var(--ac,var(--acc)) 25%,transparent);}
.sauce-sq-em{font-size:22px;line-height:1;}
.sauce-sq-nm{font-size:10px;font-weight:700;color:var(--txt2);line-height:1.2;max-width:58px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sauce-sq.on .sauce-sq-nm{color:#fff;}
.sauce-sq.autre{border-style:dashed;}
/* Sauce list (modal "Autre") */
.sauce-list-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;}
.sauce-list-sheet{background:var(--bg3);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:430px;max-height:70dvh;overflow-y:auto;padding:0 0 var(--safe-b);border:1px solid var(--bdr2);border-bottom:none;}
.sauce-list-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg3);z-index:1;}
.sauce-list-hd h3{font-size:16px;font-weight:800;}
.sauce-list-item{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.sauce-list-item:active{background:var(--sur);}
.sauce-list-item.on{background:color-mix(in srgb,var(--acc) 10%,var(--bg3));}
.sauce-list-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .15s var(--spr);}
.sauce-list-item.on .sauce-list-check{background:var(--acc);border-color:var(--acc);color:#fff;}
.sauce-list-nm{font-size:14px;font-weight:600;}
/* Emoji picker in settings */
.emoji-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.emoji-row{display:flex;align-items:center;gap:8px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:8px 10px;}
.emoji-item-nm{flex:1;font-size:13px;font-weight:600;color:var(--txt);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.emoji-in{width:44px;text-align:center;background:var(--bg4);border:1.5px solid var(--bdr);border-radius:8px;padding:4px;font-size:20px;outline:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.emoji-in:focus{border-color:var(--acc);}

/* SAUCE MULTI-INPUT */
.sauce-wrap{position:relative;margin-bottom:10px;}
.sauce-tags-area{
  min-height:44px;background:var(--bg4);border:1.5px solid var(--bdr);
  border-radius:var(--r-sm);padding:6px 10px;
  display:flex;flex-wrap:wrap;gap:5px;align-items:center;cursor:text;
  transition:border-color .2s,box-shadow .2s;
}
.sauce-tags-area.focus{border-color:var(--acc);box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 18%,transparent);}
.sauce-tag{display:flex;align-items:center;gap:4px;background:color-mix(in srgb,var(--acc) 18%,var(--bg3));border:1px solid color-mix(in srgb,var(--acc) 30%,transparent);border-radius:20px;padding:3px 10px 3px 10px;font-size:12px;font-weight:700;color:var(--acc);}
.sauce-tag-del{background:none;border:none;color:var(--acc);cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 2px;opacity:.7;-webkit-tap-highlight-color:transparent;}
.sauce-tag-del:active{opacity:1;}
.sauce-text-in{border:none;outline:none;background:transparent;color:var(--txt);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;min-width:80px;flex:1;}
.sauce-text-in::placeholder{color:var(--txt3);}
.sauce-suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:80;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:var(--r-md);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:fadeUp .2s var(--ease);}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.sug-item{padding:12px 14px;font-size:14px;font-weight:600;color:var(--txt);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--bdr);-webkit-tap-highlight-color:transparent;}
.sug-item:last-child{border-bottom:none;}
.sug-item:active{background:var(--sur2);}
.sug-hl{color:var(--acc);}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chip{padding:7px 15px;border-radius:30px;border:1.5px solid var(--bdr2);font-size:13px;font-weight:700;background:var(--sur);color:var(--txt2);cursor:pointer;white-space:nowrap;transition:all .18s var(--spr);-webkit-tap-highlight-color:transparent;}
.chip:active{transform:scale(.88);}
.chip.on{border-color:var(--ac,var(--acc));background:color-mix(in srgb,var(--ac,var(--acc)) 22%,var(--bg3));color:#fff;box-shadow:0 0 0 3px color-mix(in srgb,var(--ac,var(--acc)) 25%,transparent);}
.chip .cp{font-size:10px;opacity:.7;margin-left:3px;}

.ip-confirm{width:100%;padding:15px;border-radius:var(--r-md);border:none;background:linear-gradient(135deg,#FF8C5A,var(--acc));color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;box-shadow:0 4px 20px color-mix(in srgb,var(--acc) 40%,transparent);transition:transform .18s var(--spr);-webkit-tap-highlight-color:transparent;}
.ip-confirm:active{transform:scale(.94);}
.ip-cancel{width:100%;padding:10px;border-radius:var(--r-sm);border:1px solid var(--bdr);background:var(--sur);color:var(--txt2);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;transition:transform .15s var(--spr);-webkit-tap-highlight-color:transparent;}
.ip-cancel:active{transform:scale(.95);}
/* Compact dv for calc */
.dv-sm{display:flex;align-items:center;gap:8px;margin:3px 0 6px;}
.dv-sm span{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);white-space:nowrap;}
.dv-sm::before,.dv-sm::after{content:'';flex:1;height:1px;background:var(--bdr);}

/* FLOATING CART */
.fcart{
  position:absolute;bottom:calc(var(--safe-b) + 8px);left:10px;right:10px;
  background:var(--bg3);border:1.5px solid var(--bdr2);
  border-radius:var(--r-xl);
  box-shadow:0 -4px 40px rgba(0,0,0,.6),0 8px 40px rgba(0,0,0,.4);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:40;
  transform:translateY(120%);opacity:0;
  transition:transform .38s var(--spr),opacity .28s,max-height .3s var(--ease);
  will-change:transform;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.fcart.open{transform:translateY(0);opacity:1;}
/* Collapsed: just header */
.fcart.collapsed .fc-body{display:none;}
.fcart.collapsed .fc-ft{display:none!important;}
/* Expanded large: user pulled up */
.fcart.tall{max-height:82vh;}

/* Resize handle */
.fc-handle{text-align:center;padding:4px 0 2px;cursor:ns-resize;flex-shrink:0;}
.fc-handle-bar{display:inline-block;width:36px;height:4px;border-radius:2px;background:var(--bdr2);}

.fc-hd{display:flex;align-items:center;gap:10px;padding:10px 15px 10px;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;border-bottom:1px solid transparent;transition:border-color .2s;}
.fcart:not(.collapsed) .fc-hd{border-bottom-color:var(--bdr);}
.fc-title{font-size:15px;font-weight:800;flex:1;}
.fc-count{font-size:13px;font-weight:700;color:var(--acc);}
.fc-tot-hd{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;}
.fc-arr{font-size:16px;color:var(--txt2);transition:transform .25s var(--ease);}
.fcart.collapsed .fc-arr{transform:rotate(180deg);}

.fc-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;max-height:34vh;scrollbar-width:none;}
.fcart.tall .fc-body{max-height:none;}
.fc-body::-webkit-scrollbar{display:none;}

/* Cart items */
.ci{border-bottom:1px solid var(--bdr);}
.ci-row{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;}
.ci-row:active{background:var(--sur);}
.ci-dot{width:8px;height:8px;border-radius:50%;background:var(--ac,var(--acc));flex-shrink:0;}
.ci-main{flex:1;min-width:0;}
.ci-name{font-size:14px;font-weight:700;}

.cok:active{transform:scale(.95);box-shadow:0 2px 10px color-mix(in srgb,var(--acc) 25%,transparent);}

.hr{border:none;border-top:1px solid var(--bdr);margin:10px 0;}

<script>
/* ═══════════ CONSTANTS ═══════════ */

const PALETTE=[
  {bg:'rgba(74,144,217,.08)',bd:'rgba(74,144,217,.28)',ac:'#4A90D9',glow:'rgba(74,144,217,.14)'},

  {bg:'rgba(212,184,74,.08)',bd:'rgba(212,184,74,.28)',ac:'#D4B84A',glow:'rgba(212,184,74,.14)'},
  {bg:'rgba(123,159,212,.08)',bd:'rgba(123,159,212,.28)',ac:'#7B9FD4',glow:'rgba(123,159,212,.14)'},

  {bg:'rgba(224,123,106,.08)',bd:'rgba(224,123,106,.28)',ac:'#E07B6A',glow:'rgba(224,123,106,.14)'},

const _cmap={};let _ci2=0;
function iCol(n){const k=n.toLowerCase().replace(/[^a-z0-9]/g,'');if(_cmap[k]===undefined)_cmap[k]=(_ci2++)%PALETTE.length;return PALETTE[_cmap[k]];}

const DEF_DATA={
  pools:{
    burger:  [{id:'b1',name:'Classic Burger',priceMenu:9.5,priceSolo:6.5},{id:'b2',name:'Double Burger',priceMenu:11.5,priceSolo:8.5},{id:'b3',name:'Cheese Burger',priceMenu:10,priceSolo:7},{id:'b4',name:'BBQ Burger',priceMenu:10.5,priceSolo:7.5}],
    wrap:    [{id:'w1',name:'Wrap Poulet',priceMenu:9,priceSolo:6},{id:'w2',name:'Wrap Légumes',priceMenu:8.5,priceSolo:5.5},{id:'w3',name:'Wrap Falafel',priceMenu:8,priceSolo:5}],
    snack:   [{id:'pf1',name:'Mini Burger',price:5.5},{id:'pf2',name:'Nuggets x6',price:4.5},{id:'pf3',name:'Hot Dog',price:4},{id:'pf4',name:'Onion Rings',price:3.5}],
    boisson: [{id:'bo1',name:'Coca-Cola',price:2.5},{id:'bo2',name:'Eau plate',price:1.5},{id:'bo3',name:"Jus d'orange",price:2.5},{id:'bo4',name:'Ice Tea',price:2},{id:'bo5',name:'Café',price:1.8}],
  },
  supplements:{
    shared:[{id:'s1',name:'+ Bacon',price:1.5},{id:'s2',name:'+ Cheddar',price:.8},{id:'s3',name:'+ Avocat',price:1.2},{id:'s4',name:'+ Oeuf',price:1},{id:'s5',name:'+ Fromage',price:.8},{id:'s6',name:'+ Double Poulet',price:2}],
    snack: [{id:'sn1',name:'+ Sauce Dip',price:.5},{id:'sn2',name:'+ Extra',price:1.5}],
    boisson:[],
  },
  sauces:['Ketchup','Mayonnaise','Piment','Sauce créole','Sauce Brazil','Barbecue','Moutarde','Harissa','Sauce burger','Sans sauce','Algérienne'],
  emojis:{},/* itemId → custom emoji */
};

/* ═══════════ STATE ═══════════ */
let D,orders,cart=[],tab='burgersec',view='menu',oc=1;
let expandedLine=null,cartCollapsed=true;
let _uid=9000;function uid(){return'x'+(++_uid);}

/* Picker state */
let picker=null;
/* picker = {id, secKey, step:'menuq'|'config', isMenu:bool, sauceTags:[], sauceInput:'', supps:[], garnitures:[]} */

/* ═══════════ STORAGE ═══════════ */
let _tt2=null;
function showToast(m,c){const e=document.getElementById('toast');e.textContent=m;e.className=c+' show';clearTimeout(_tt2);_tt2=setTimeout(()=>e.className=c,2200);}
function lsGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));showToast('Sauvegardé','saved');}catch{showToast('Erreur','error');}}
function loadD(){
  const s=lsGet(LS_D);
  if(!s)return JSON.parse(JSON.stringify(DEF_DATA));
  const d=s;
  if(!d.sauces)d.sauces=[...DEF_DATA.sauces];
  if(!d.emojis)d.emojis={};
  if(!d.supplements)d.supplements={};
  if(!d.supplements.shared)d.supplements.shared=JSON.parse(JSON.stringify(DEF_DATA.supplements.shared));
  if(!d.supplements.snack)d.supplements.snack=JSON.parse(JSON.stringify(DEF_DATA.supplements.snack));
  if(!d.supplements.boisson)d.supplements.boisson=[];
  if(!d.pools)d.pools={};
  Object.keys(DEF_DATA.pools).forEach(k=>{if(!d.pools[k])d.pools[k]=JSON.parse(JSON.stringify(DEF_DATA.pools[k]));});
  /* Migrate old pools without priceMenu/priceSolo */
  ['burger','wrap'].forEach(k=>{d.pools[k].forEach(it=>{if(it.price!==undefined&&it.priceMenu===undefined){it.priceMenu=it.price;it.priceSolo=it.price*.7;delete it.price;}});});
  return d;
}
function saveD(){lsSet(LS_D,D);}
function loadO(){const s=lsGet(LS_O);if(!s||!Array.isArray(s))return[];return s.map(o=>({...o,time:new Date(o.time)}));}
function saveO(){lsSet(LS_O,orders);}

/* ═══════════ UTILS ═══════════ */
function fp(p){return(+p).toFixed(2).replace('.',',')+'\u00a0\u20ac';}
function ft(d){return new Date(d).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function fd(d){return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getItemById(id){return Object.values(D.pools).flat().find(i=>i.id===id);}
function getSecItems(secKey){
  const sec=SECS[secKey];
  if(sec.isMenuable)return D.pools[sec.menuKey]||[];
  return D.pools[sec.poolKey]||[];
}
function inCart(id){return cart.filter(l=>l.itemId===id).length;}
function lineT(l){
  const base=l.linePrice||0;
  return base+(l.supps||[]).reduce((s,x)=>s+x.price,0);
}
function cartT(){return cart.reduce((s,l)=>s+lineT(l),0);}
function iEmoji(n,id){
  if(id&&D.emojis&&D.emojis[id])return D.emojis[id];
  n=n.toLowerCase();
  if(n.includes('burger'))return'🍔';if(n.includes('wrap'))return'🌯';if(n.includes('nugget'))return'🍗';if(n.includes('hot'))return'🌭';if(n.includes('onion'))return'🧅';if(n.includes('coca')||n.includes('cola'))return'🥤';if(n.includes('eau'))return'💧';if(n.includes('jus')||n.includes('orange'))return'🍊';if(n.includes('ice'))return'🧊';if(n.includes('caf'))return'☕';if(n.includes('falaf'))return'🧆';if(n.includes('fromage')||n.includes('cheese'))return'🧀';if(n.includes('avocat'))return'🥑';if(n.includes('bacon'))return'🥓';if(n.includes('oeuf'))return'🥚';if(n.includes('légume')||n.includes('legume'))return'🥗';if(n.includes('poulet'))return'🍗';return'🍽️';
}

function cm(id){const el=document.getElementById(id);el.classList.remove('open');setTimeout(()=>el.classList.add('hidden'),380);}
function om(id){const el=document.getElementById(id);el.classList.remove('hidden');requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('open')));}
function updateJBadge(){const b=document.getElementById('jbadge');const n=orders.filter(o=>!o.retrieved).length;b.textContent=n||'';b.classList.toggle('on',n>0);}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);lsSet('theme',t);}

/* ═══════════ VIEW SWITCH ═══════════ */
function gv(v){
  if(view===v)v='menu';view=v;
  const vmap={menu:'mv',journal:'jv',settings:'sv'};
  Object.keys(vmap).forEach(x=>{
    const el=document.getElementById(vmap[x]);
    el.classList.toggle('active',v===x);
  });
  const bj=document.getElementById('btn-j'),bs=document.getElementById('btn-s');
  bj.className='hbtn'+(v==='journal'?' on-j':'');
  bs.className='hbtn'+(v==='settings'?' on-s':'');
  const b=document.getElementById('jbadge');bj.appendChild(b);
  updateJBadge();
  if(v==='menu')rMenu();
  if(v==='journal')rJournal();
  if(v==='settings')rSettings();
}

/* ═══════════ SIDEBAR ═══════════ */
function rSidebar(){
  document.getElementById('sb').innerHTML=Object.entries(SECS).map(([k,sec])=>{
    const items=getSecItems(k);
    const hasCart=items.some(it=>inCart(it.id)>0);
    const parts=sec.label.split(' '),em=parts[0],lbl=parts.slice(1).join(' ');
    return `<div class="stab${k===tab?' on':''}${hasCart?' cart':''}" style="--c:${sec.color}" onclick="setTab('${k}')">
      <span class="stab-em">${em}</span>
      <span class="stab-lbl">${esc(lbl)}</span>
      <span class="stab-pip"></span>
    </div>`;
  }).join('');
}

/* ═══════════ PICKER ═══════════ */
function _scroll(){/* no-op: picker now fullscreen */}

function startPicker(itemId,secKey){
  const sec=SECS[secKey];
  const isBoisson=sec.suppKey==='boisson';
  const firstStep=sec.isMenuable?'menuq':(isBoisson?'sauceq':'garni');
  picker={id:itemId,secKey,step:firstStep,isMenu:false,sauceTags:[],supps:[],garnitures:[],sauceOtherOpen:false};
  rMenu();
}

function pickerChooseMenu(isMenu){
  picker.isMenu=isMenu;
  const isBoisson=SECS[picker.secKey].suppKey==='boisson';
  picker.step=isBoisson?'sauceq':'garni';
  rPickerModal();
}

function pickerValidateGarni(){
  picker.step='sauceq';rPickerModal();
}

function pickerToggleSauce(s){
  if(picker.sauceTags.includes(s))picker.sauceTags=picker.sauceTags.filter(x=>x!==s);
  else picker.sauceTags.push(s);
  _rerenderSauceGrid();
}
function pickerOpenSauceOther(){picker.sauceOtherOpen=true;rPickerModal();}
function pickerCloseSauceOther(){picker.sauceOtherOpen=false;rPickerModal();}

function _rerenderSauceList(){
  const list=document.getElementById('sauce-other-list');if(!list)return;
  const sauces=D.sauces||[];
  const ac=SECS[picker.secKey].color;
  list.innerHTML=sauces.map(s=>`<div class="sauce-list-item${picker.sauceTags.includes(s)?' on':''}" onclick="pickerToggleSauce('${esc(s)}');_rerenderSauceGrid();_rerenderSauceList()">
    <div class="sauce-list-check">${picker.sauceTags.includes(s)?'✓':''}</div>
    <span class="sauce-list-nm">${sauceEmoji(s)} ${esc(s)}</span>
  </div>`).join('');
}
function _rerenderSauceGrid(){
  const grid=document.getElementById('sauce-grid');if(!grid)return;
  const sauces=D.sauces||[];const first=sauces.slice(0,11);
  const ac=SECS[picker.secKey].color;
  grid.innerHTML=first.map(s=>`<div class="sauce-sq${picker.sauceTags.includes(s)?' on':''}" style="--ac:${ac}" onclick="pickerToggleSauce('${esc(s)}')"><span class="sauce-sq-em">${sauceEmoji(s)}</span><span class="sauce-sq-nm">${esc(s)}</span></div>`).join('')+
  `<div class="sauce-sq autre" style="--ac:${ac}" onclick="pickerOpenSauceOther()"><span class="sauce-sq-em">📋</span><span class="sauce-sq-nm">Autre</span></div>`;
  const btn=document.getElementById('sauce-confirm-btn');
  if(btn)btn.textContent=picker.sauceTags.length?`Valider — ${picker.sauceTags.length} sauce${picker.sauceTags.length>1?'s':''}`:'Continuer sans sauce';

function pickerValidateSauces(){
  picker.sauceOtherOpen=false;
  const sec=SECS[picker.secKey];
  const supps=D.supplements[sec.suppKey]||[];
  if(supps.length>0){picker.step='suppsq';rPickerModal();}

function pickerChooseSupps(want){
  if(!want){picker.supps=[];pickerConfirm();}

}

/* kept for compatibility */
function syncSauceAndGo(wantSupps){pickerChooseSupps(wantSupps);}
function syncSauceAndConfirm(){pickerConfirm();}

function pickerToggleSupp(sid){
  const sec=SECS[picker.secKey];
  const supps=D.supplements[sec.suppKey]||[];
  const s=supps.find(x=>x.id===sid);if(!s)return;
  const has=picker.supps.find(x=>x.id===sid);
  picker.supps=has?picker.supps.filter(x=>x.id!==sid):[...picker.supps,s];
  if(picker.step==='suppsq'){
    const it=getItemById(picker.id);
    const base=picker.isMenu?(it.priceMenu||it.price||0):(it.priceSolo||it.price||0);
    const total=base+picker.supps.reduce((acc,x)=>acc+x.price,0);
    const ac2=sec.color;
    const sc=document.getElementById('picker-supp-chips');
    if(sc)sc.innerHTML=supps.map(s=>`<div class="chip${picker.supps.find(x=>x.id===s.id)?' on':''}" onclick="pickerToggleSupp('${s.id}')" style="--ac:${ac2}">${esc(s.name)}<span class="cp">+${fp(s.price)}</span></div>`).join('');
    const pp=document.getElementById('picker-price-confirm');
    if(pp)pp.textContent=`Ajouter au panier — ${fp(total)}`;
  } else {
    _rerenderPickerConfig();
  }
}
function pickerToggleGarni(g){
  picker.garnitures=picker.garnitures.includes(g)?picker.garnitures.filter(x=>x!==g):[...picker.garnitures,g];
  /* re-render just garni chips */
  const ac=SECS[picker.secKey].color;
  const gc=document.getElementById('picker-garni-chips');
  if(gc)gc.innerHTML=GARNI.map(g2=>`<div class="chip${picker.garnitures.includes(g2)?' on':''}" onclick="pickerToggleGarni('${g2}')" style="--ac:${ac}">${g2}</div>`).join('');
}

function sauceEmoji(s){
  s=s.toLowerCase();
  if(s.includes('ketchup'))return'🍅';if(s.includes('mayo'))return'🥚';if(s.includes('piment')||s.includes('harissa'))return'🌶️';if(s.includes('barbec')||s.includes('bbq'))return'🔥';if(s.includes('moutarde'))return'🟡';if(s.includes('burger'))return'🍔';if(s.includes('créol')||s.includes('creol'))return'🌴';if(s.includes('brazil'))return'🌿';if(s.includes('algér'))return'⭐';if(s.includes('sans'))return'🚫';if(s.includes('fromage')||s.includes('cheese'))return'🧀';if(s.includes('poivre'))return'🫙';if(s.includes('ail'))return'🧄';if(s.includes('curry'))return'🟠';return'🥫';
}

/* Sauce multi-tag system — kept for "Autre" list */
function pickerSauceKeyup(e){
  const v=e.target.value;
  picker.sauceInput=v;
  if(v.endsWith(',')&&v.trim().length>1){
    const tag=v.slice(0,v.lastIndexOf(',')).trim();
    if(tag)_addSauceTag(tag);
    e.target.value='';picker.sauceInput='';
  } else {
    _showSauceSugs(v,'picker-sugs');
  }
}
function _addSauceTag(tag){
  if(!picker.sauceTags.includes(tag))picker.sauceTags.push(tag);
  const inp=document.getElementById('picker-sauce-in');
  if(inp){inp.value='';picker.sauceInput='';}
  const box=document.getElementById('picker-sugs');if(box)box.innerHTML='';
  _rerenderSauceTags('picker-tags','picker-sugs');
}
function pickerRmTag(i){picker.sauceTags.splice(i,1);_rerenderSauceTags('picker-tags','picker-sugs');}
function pickSauceSug(tag){_addSauceTag(tag);}

function _rerenderSauceTags(tagsId,sugsId){
  const wrap=document.getElementById(tagsId);if(!wrap)return;
  wrap.innerHTML=picker.sauceTags.map((t,i)=>`<span class="sauce-tag">${esc(t)}<button class="sauce-tag-del" onclick="pickerRmTag(${i})">×</button></span>`).join('')+
    `<input class="sauce-text-in" id="picker-sauce-in" placeholder="${picker.sauceTags.length?'Autre sauce…':'Sauces (virgule pour valider)…'}" value="${esc(picker.sauceInput)}" oninput="pickerSauceKeyup({target:this})" onkeydown="pickerSauceKD(event)"/>`;
  const inp=document.getElementById('picker-sauce-in');if(inp)inp.focus();
}
function pickerSauceKD(e){
  if(e.key==='Enter'||e.key===','||e.key===';'){
    e.preventDefault();
    const v=e.target.value.trim();
    if(v){_addSauceTag(v);}
  }
  if(e.key==='Backspace'&&!e.target.value&&picker.sauceTags.length){
    picker.sauceTags.pop();_rerenderSauceTags('picker-tags','picker-sugs');
  }
}

function _showSauceSugs(v,boxId){
  const box=document.getElementById(boxId);if(!box)return;
  if(!v||v.trim().length<1){box.innerHTML='';return;}
  const q=v.trim().toLowerCase();
  const matches=(D.sauces||[]).filter(s=>s.toLowerCase().includes(q)&&!picker.sauceTags.includes(s)).slice(0,5);
  if(!matches.length){box.innerHTML='';return;}
  const hl=(s,qq)=>{const i=s.toLowerCase().indexOf(qq);if(i<0)return esc(s);return esc(s.slice(0,i))+'<span class="sug-hl">'+esc(s.slice(i,i+qq.length))+'</span>'+esc(s.slice(i+qq.length));};
  box.innerHTML=matches.map(s=>`<div class="sug-item" onclick="pickSauceSug('${esc(s)}')">${hl(s,q)}</div>`).join('');
}

function _rerenderPickerConfig(){
  const sec=SECS[picker.secKey];
  const supps=D.supplements[sec.suppKey]||[];
  const ac=sec.color;
  const gc=document.getElementById('picker-garni-chips');
  if(gc)gc.innerHTML=GARNI.map(g=>`<div class="chip${picker.garnitures.includes(g)?' on':''}" onclick="pickerToggleGarni('${g}')" style="--ac:${ac}">${g}</div>`).join('');
  const sc=document.getElementById('picker-supp-chips');
  if(sc)sc.innerHTML=supps.map(s=>`<div class="chip${picker.supps.find(x=>x.id===s.id)?' on':''}" onclick="pickerToggleSupp('${s.id}')" style="--ac:${ac}">${esc(s.name)}<span class="cp">+${fp(s.price)}</span></div>`).join('');
  const pp=document.getElementById('picker-price-confirm');
  if(pp){const it=getItemById(picker.id);const base=picker.isMenu?it.priceMenu:(it.priceSolo||it.price||0);pp.textContent=`Ajouter au panier — ${fp(base+picker.supps.reduce((s,x)=>s+x.price,0))}`;}
}

function pickerConfirm(){
  /* sync sauce input */
  const inp=document.getElementById('picker-sauce-in');
  if(inp&&inp.value.trim())_addSauceTag(inp.value.trim());
  const it=getItemById(picker.id);if(!it)return;
  const base=picker.isMenu?(it.priceMenu||it.price||0):(it.priceSolo||it.price||0);
  const line={
    lineKey:uid(),itemId:picker.id,secKey:picker.secKey,
    isMenu:picker.isMenu,linePrice:base,
    sauceTags:[...picker.sauceTags],
    supps:[...picker.supps],garnitures:[...picker.garnitures],
  };
  flyDot();
  cart.push(line);
  picker=null;
  /* Panier reste réduit — l'utilisateur l'ouvre quand il est prêt */
  rMenu();rCart();
}
function cancelPicker(){picker=null;const m=document.getElementById('picker-modal');if(m){m.style.display='none';m.innerHTML='';}rMenu();}
function pickerBack(){
  if(!picker)return;
  const sec=SECS[picker.secKey];
  if(picker.step==='suppsq') picker.step='sauceq';
  else if(picker.step==='sauceq') picker.step= sec.isMenuable?'garni':'garni';
  else if(picker.step==='garni') picker.step='menuq';
  rPickerModal();
}

function flyDot(){
  const fc=document.getElementById('fcart');if(!fc)return;
  const r=fc.getBoundingClientRect();
  const dot=document.createElement('div');dot.className='fly-dot';
  dot.style.cssText=`left:${window.innerWidth/2-6}px;top:${window.innerHeight/2-6}px;`;
  document.body.appendChild(dot);
  requestAnimationFrame(()=>{
    dot.style.transition='all .5s cubic-bezier(.4,0,.2,1)';
    dot.style.left=(r.left+r.width/2-6)+'px';
    dot.style.top=(r.top+10)+'px';
    dot.style.opacity='0';dot.style.transform='scale(.2)';
    setTimeout(()=>dot.remove(),560);
  });
}

/* ═══════════ MENU RENDER ═══════════ */
function rMenu(){
  rSidebar();
  const sec=SECS[tab];
  const items=getSecItems(tab);
  const ac=sec.color;
  let html='';

  items.forEach(it=>{
    const c=iCol(it.name),q=inCart(it.id);
    const isPicking=picker&&picker.id===it.id;
    const displayPrice=sec.isMenuable?(it.priceSolo||it.price||0):(it.price||0);
    html+=`<div class="icard${(q>0||isPicking)?' sel':''}"
      style="background:${c.bg};border-color:${isPicking||q>0?c.ac:c.bd};--ac:${c.ac};--glow:${c.glow}"
      onclick="onTap('${it.id}','${tab}')">
      <span class="icard-em">${iEmoji(it.name,it.id)}</span>
      <span class="icard-name">${esc(it.name)}</span>
      <span class="icard-price">${fp(displayPrice)}</span>

    const otherOverlay=picker.sauceOtherOpen?`<div class="sauce-list-overlay" onclick="event.target===this&&pickerCloseSauceOther()">
      <div class="sauce-list-sheet">
        <div class="sauce-list-hd"><h3>🥫 Toutes les sauces</h3><button class="shc" onclick="pickerCloseSauceOther()">✕</button></div>
        <div id="sauce-other-list">${sauces.map(s=>`<div class="sauce-list-item${picker.sauceTags.includes(s)?' on':''}" onclick="pickerToggleSauce('${esc(s)}');_rerenderSauceGrid();_rerenderSauceList()">
          <div class="sauce-list-check">${picker.sauceTags.includes(s)?'✓':''}</div>

  else if(picker.step==='sauceq'&&!sec3.isMenuable&&sec3.suppKey!=='boisson')prevStep='garni';
  else if(picker.step==='suppsq')prevStep='sauceq';

function setTab(k){
  if(k!==tab){picker=null;}
  tab=k;rMenu();
}
function onTap(id,secKey){
  if(picker&&picker.id===id){cancelPicker();return;}
  picker=null;
  /* Boissons et Petite Faim → ajout direct au panier, sans picker */
  const sec=SECS[secKey];
  if(!sec.isMenuable){
    const it=getItemById(id);if(!it)return;
    cart.push({lineKey:uid(),itemId:id,secKey,isMenu:false,linePrice:it.price||0,sauceTags:[],supps:[],garnitures:[]});

  }
  startPicker(id,secKey);
}

/* ═══════════ FLOATING CART ═══════════ */
/* Cart height control: collapsed=header only, normal=header+body (max-height 34vh), tall=header+body (82vh) */
let cartTall=false;

function toggleCart(){
  cartCollapsed=!cartCollapsed;
  if(cartCollapsed)cartTall=false;
  const fc=document.getElementById('fcart');
  fc.classList.toggle('collapsed',cartCollapsed);
  fc.classList.toggle('tall',!cartCollapsed&&cartTall);
  if(cartCollapsed)document.getElementById('fc-ft').style.display='none';
  else document.getElementById('fc-ft').style.display='block';
}

/* Drag handle to resize */
function initCartDrag(){
  const handle=document.getElementById('fc-handle');
  const fc=document.getElementById('fcart');
  let startY=0,startH=0,dragging=false;
  function onStart(e){
    if(cartCollapsed)return;
    dragging=true;startY=e.touches?e.touches[0].clientY:e.clientY;startH=fc.offsetHeight;
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging)return;
    const y=e.touches?e.touches[0].clientY:e.clientY;
    const delta=startY-y;/* drag up = bigger */
    const newH=Math.min(Math.max(startH+delta,80),window.innerHeight*.85);
    const pct=newH/window.innerHeight;
    cartTall=pct>.45;
    fc.classList.toggle('tall',cartTall);
    e.preventDefault();
  }
  function onEnd(){dragging=false;}
  handle.addEventListener('touchstart',onStart,{passive:false});
  handle.addEventListener('touchmove',onMove,{passive:false});
  handle.addEventListener('touchend',onEnd);
  handle.addEventListener('mousedown',onStart);
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onEnd);
}

function rCart(){
  const fc=document.getElementById('fcart');
  if(!cart.length){
    fc.classList.remove('open');
    cartCollapsed=true;cartTall=false;
    fc.classList.add('collapsed');fc.classList.remove('tall');
    return;
  }
  fc.classList.add('open');
  fc.classList.toggle('collapsed',cartCollapsed);
  fc.classList.toggle('tall',!cartCollapsed&&cartTall);
  document.getElementById('fc-ft').style.display=cartCollapsed?'none':'block';

  document.getElementById('fc-count').textContent=`${cart.length} article${cart.length>1?'s':''}`;
  document.getElementById('fc-tothd').textContent=fp(cartT());

  const body=document.getElementById('fc-body');
  body.innerHTML=cart.map((ln,idx)=>{
    const it=getItemById(ln.itemId);if(!it)return'';
    const sec=SECS[ln.secKey]||SECS[Object.keys(SECS)[0]];
    const ac=sec.color;
    const sauceTxt=(ln.sauceTags||[]).join(', ');
    const tagsTxt=[(ln.garnitures||[]).join(', '),sauceTxt,(ln.supps||[]).map(s=>s.name).join(', ')].filter(Boolean).join(' · ');
    const isExp=expandedLine===idx;
    const supps=D.supplements[sec.suppKey]||[];
    const noG=sec.suppKey==='boisson';
    const selSupps=supps.map(s=>`<div class="chip${(ln.supps||[]).find(x=>x.id===s.id)?' on':''}" onclick="cToggleSupp(${idx},'${s.id}')" style="--ac:${ac}">${esc(s.name)}<span class="cp">+${fp(s.price)}</span></div>`).join('');
    const selG=GARNI.map(g=>`<div class="chip${(ln.garnitures||[]).includes(g)?' on':''}" onclick="cToggleGarni(${idx},'${g}')" style="--ac:${ac}">${g}</div>`).join('');
    /* Cart sauce tags */
    const cSauceTags=(ln.sauceTags||[]).map((t,i)=>`<span class="sauce-tag">${esc(t)}<button class="sauce-tag-del" onclick="cRmSauceTag(${idx},${i})">×</button></span>`).join('');
    return `<div class="ci${isExp?' exp':''}" id="ci-${idx}">
      <div class="ci-row" onclick="toggleLine(${idx})">
        <span class="ci-dot" style="background:${ac}"></span>
        <div class="ci-main">
          <div class="ci-name">${ln.isMenu?'<span style="font-size:9px;background:'+ac+';color:#fff;border-radius:4px;padding:1px 5px;margin-right:4px;vertical-align:middle;font-weight:800">MENU</span>':''}${esc(it.name)}</div>
          ${tagsTxt&&!isExp?`<div class="ci-tags">${esc(tagsTxt)}</div>`:''}
        </div>
        <span class="ci-price">${fp(lineT(ln))}</span>
        <button class="ci-del" onclick="event.stopPropagation();rmLine(${idx})">✕</button>
        <span class="ci-arr">▼</span>
      </div>
      <div class="ci-detail"><div style="--ac:${ac}">
        ${!noG?`<div class="mlbl">Garnitures</div><div class="chips">${selG}</div>
        <div class="mlbl">Sauces <span style="font-size:10px;color:var(--txt3);font-weight:500">(virgule = nouvelle sauce)</span></div>
        <div class="sauce-wrap">
          <div class="sauce-tags-area" onclick="document.getElementById('csi-${idx}').focus()">
            ${cSauceTags}<input class="sauce-text-in" id="csi-${idx}" placeholder="${(ln.sauceTags||[]).length?'Autre sauce…':'Sauces…'}" oninput="cSauceInput(${idx},this)" onkeydown="cSauceKD(${idx},event)"/>
          </div>
          <div class="sauce-suggestions" id="csugs-${idx}"></div>
        </div>`:''}
        ${supps.length?`<div class="mlbl">Suppléments</div><div class="chips">${selSupps}</div>`:''}
      </div></div>
    </div>`;
  }).join('');

  document.getElementById('fc-lbl').textContent=`TOTAL · ${cart.length} article${cart.length>1?'s':''}`;
  document.getElementById('fc-amt').textContent=fp(cartT());
}

function toggleLine(idx){
  expandedLine=expandedLine===idx?null:idx;
  rCart();
  /* Auto-collapse other details: already handled by expandedLine logic */
}

function rmLine(idx){
  cart.splice(idx,1);
  if(expandedLine>=cart.length||expandedLine===idx)expandedLine=null;
  /* Auto-reset: collapse tall if cart is small */
  if(cart.length<3)cartTall=false;
  rCart();rMenu();
}

function cToggleSupp(idx,sid){
  const ln=cart[idx];if(!ln)return;
  const sec=SECS[ln.secKey]||SECS[Object.keys(SECS)[0]];
  const s=(D.supplements[sec.suppKey]||[]).find(x=>x.id===sid);if(!s)return;
  const has=(ln.supps||[]).find(x=>x.id===sid);
  ln.supps=has?(ln.supps||[]).filter(x=>x.id!==sid):[...(ln.supps||[]),s];
  rCart();
}
function cToggleGarni(idx,g){
  const ln=cart[idx];if(!ln)return;
  ln.garnitures=(ln.garnitures||[]).includes(g)?(ln.garnitures||[]).filter(x=>x!==g):[...(ln.garnitures||[]),g];rCart();
}
function cSauceInput(idx,inp){
  const v=inp.value;
  if(v.endsWith(',')&&v.trim().length>1){
    const tag=v.slice(0,v.lastIndexOf(',')).trim();
    if(tag){const ln=cart[idx];if(!ln)return;if(!ln.sauceTags)ln.sauceTags=[];if(!ln.sauceTags.includes(tag))ln.sauceTags.push(tag);}
    inp.value='';
    rCart();
  } else {
    _showCartSugs(idx,v);
  }
}
function cSauceKD(idx,e){
  const ln=cart[idx];if(!ln)return;
  if(e.key==='Enter'||e.key===','||e.key===';'){e.preventDefault();const v=e.target.value.trim();if(v){if(!ln.sauceTags)ln.sauceTags=[];if(!ln.sauceTags.includes(v))ln.sauceTags.push(v);e.target.value='';rCart();}}
  if(e.key==='Backspace'&&!e.target.value&&(ln.sauceTags||[]).length){ln.sauceTags.pop();rCart();}
}
function _showCartSugs(idx,v){
  const box=document.getElementById(`csugs-${idx}`);if(!box)return;
  const ln=cart[idx];
  if(!v||v.trim().length<1){box.innerHTML='';return;}
  const q=v.trim().toLowerCase();
  const matches=(D.sauces||[]).filter(s=>s.toLowerCase().includes(q)&&!(ln.sauceTags||[]).includes(s)).slice(0,5);
  const hl=(s,qq)=>{const i=s.toLowerCase().indexOf(qq);if(i<0)return esc(s);return esc(s.slice(0,i))+'<span class="sug-hl">'+esc(s.slice(i,i+qq.length))+'</span>'+esc(s.slice(i+qq.length));};
  box.innerHTML=matches.map(s=>`<div class="sug-item" onclick="cPickSug(${idx},'${esc(s)}')">${hl(s,q)}</div>`).join('');
}
function cPickSug(idx,tag){
  const ln=cart[idx];if(!ln)return;if(!ln.sauceTags)ln.sauceTags=[];
  if(!ln.sauceTags.includes(tag))ln.sauceTags.push(tag);
  const box=document.getElementById(`csugs-${idx}`);if(box)box.innerHTML='';
  rCart();
}
function cRmSauceTag(idx,i){const ln=cart[idx];if(!ln||!ln.sauceTags)return;ln.sauceTags.splice(i,1);rCart();}

/* ═══════════ ORDER ═══════════ */
function doOrder(paid,given){
  if(!cart.length)return;
  const nm=(document.getElementById('cname')||{}).value||'';
  const lines=cart.map(l=>({...l,itemName:getItemById(l.itemId)?.name||'?',unitTotal:lineT(l)}));
  orders.unshift({id:oc++,clientName:nm.trim(),lines,total:cartT(),paid,givenAmount:paid?given:0,retrieved:false,time:new Date()});
  saveO();cart=[];expandedLine=null;cartCollapsed=true;cartTall=false;picker=null;
  const cn=document.getElementById('cname');if(cn)cn.value='';
  rCart();rMenu();
  showToast(paid?'✅ Commande enregistrée — Payée':'📋 Commande enregistrée','saved');
  setTimeout(()=>gv('journal'),320);
}

/* ═══════════ JOURNAL ═══════════ */

      <div class="bcell"><div class="bv" style="color:var(--red)">${fp(at.reduce((s,o)=>s+o.total,0))}</div><div class="bl">⏳ Impayé (${at.length})</div></div>
      <div class="bcell"><div class="bv" style="color:var(--amb)">${nr.length}</div><div class="bl">🟡 À récupérer</div></div>

      <button class="jabtn jshare" onclick="doShare()">📤 Partager</button>

    </div></div>`;
  }
  h+=`<div class="sec-label">Commandes</div>`;
  if(!orders.length){h+=`<div class="empty"><div class="empty-i">📋</div><div class="empty-t">Aucune commande</div><div class="empty-s">Les commandes s'afficheront ici</div></div>`;}
  else{
    const sorted=[...orders.filter(o=>!o.retrieved),...orders.filter(o=>o.retrieved)];
    h+=sorted.map(o=>{
      let cls='jcard ';
      if(o.retrieved)cls+='done';
      else if(o.paid)cls+='paid-c';
      else cls+='unpaid-c';
      const lh=o.lines.map(l=>{
        const st=(l.sauceTags||[]).join(', ')||(l.sauceText||'');
        const b=l.isMenu?`<span class="mbadge">menu</span>`:'';
        const g=l.garnitures&&l.garnitures.length?`<span class="gi"> · ${esc(l.garnitures.join(', '))}</span>`:'';
        const s=st?`<span class="sc"> · ${esc(st)}</span>`:'';
        const sp=l.supps&&l.supps.length?' · '+esc(l.supps.map(x=>x.name).join(', ')):'';
        return `<div>${b}${esc(l.itemName)}${g}${s}${sp} <span style="color:var(--txt3);font-size:11px">— ${fp(l.unitTotal)}</span></div>`;
      }).join('');
      return `<div class="${cls}">
        <div class="jbtns">
          <button class="jb jb-p ${o.paid?'pd':'up'}" onclick="openCalc(${o.id},false)">P</button>
          <button class="jb jb-r ${o.retrieved?'re':'nr'}" onclick="tRetrieved(${o.id})">R</button>
          <button class="jb jb-t" onclick="openTicket(${o.id})">T</button>
          <button class="jb jb-e" onclick="openEdit(${o.id})">E</button>
        </div>
        <div class="jinfo">
          <div class="jmet">
            <div>${o.clientName?`<div class="jnm">👤 ${esc(o.clientName)}</div>`:''}<span class="jid">#${String(o.id).padStart(3,'0')} · ${fd(o.time)}</span></div>
            <span class="jmetr"><span class="jst ${o.paid?'pd':'up'}">${o.paid?'Payé':'Impayé'}</span><button class="jdel" onclick="delOrder(${o.id})">✕</button></span>
          </div>
          <div class="jitems">${lh}</div>
          <div class="jmet" style="margin-top:5px"><span class="jtime">${ft(o.time)}</span><span class="jtot">${fp(o.total)}</span></div>
        </div>
      </div>`;
    }).join('');
  }
  el.innerHTML=h;
}

function tRetrieved(id){const o=orders.find(x=>x.id===id);if(o){o.retrieved=!o.retrieved;saveO();rJournal();updateJBadge();}}
function delOrder(id){if(!confirm('Supprimer ?'))return;orders=orders.filter(o=>o.id!==id);saveO();rJournal();updateJBadge();}

function doShare(){
  const py=orders.filter(o=>o.paid),at=orders.filter(o=>!o.paid),nr=orders.filter(o=>!o.retrieved),now=new Date();
  const txt=['🧾 JOURNAL','📅 '+fd(now)+' '+ft(now),'','📊 BILAN',`• ${orders.length} commande(s) · ${fp(orders.reduce((s,o)=>s+o.total,0))}`,`• ✅ ${py.length} · ${fp(py.reduce((s,o)=>s+o.total,0))}`,`• ⏳ ${at.length} · ${fp(at.reduce((s,o)=>s+o.total,0))}`,`• 🟡 ${nr.length} à récupérer`,'','📋 DÉTAIL',...orders.map(o=>`${o.clientName?'['+o.clientName+'] ':''}#${String(o.id).padStart(3,'0')} ${o.paid?'✅':'⏳'} ${o.retrieved?'✔':'🟡'} ${ft(o.time)} — ${fp(o.total)}\n`+o.lines.map(l=>{const st=(l.sauceTags||[]).join(', ')||(l.sauceText||'');return`  ${l.isMenu?'[M] ':''}· ${l.itemName}`+(l.garnitures&&l.garnitures.length?` (${l.garnitures.join(', ')})`:'')+(st?` [${st}]`:'')+(l.supps&&l.supps.length?` + ${l.supps.map(s=>s.name).join(', ')}`:'')+'  '+fp(l.unitTotal);}).join('\n'))].join('\n');

/* ═══════════ TICKET ═══════════ */
let _tid=null;
function openTicket(id){
  _tid=id;const o=orders.find(x=>x.id===id);if(!o)return;
  const groups=[];
  o.lines.forEach(l=>{const st=(l.sauceTags||[]).join(', ')||(l.sauceText||'');const k=l.itemName+st+(l.garnitures||[]).join('')+(l.supps||[]).map(s=>s.id).join('');const ex=groups.find(g=>g.key===k);if(ex){ex.qty++;ex.sub+=l.unitTotal;}else groups.push({key:k,name:l.itemName,isMenu:l.isMenu,st,garni:l.garnitures||[],supps:l.supps||[],qty:1,sub:l.unitTotal});});
  const lh=groups.map(g=>`<div class="tl"><span class="tn">${g.qty>1?g.qty+'x ':''}${g.isMenu?'[M] ':''}${g.name}</span><span class="tp">${fp(g.sub)}</span></div>${(g.garni.length||g.st||g.supps.length)?`<div class="tdt">${[g.garni.join(', '),g.st,...g.supps.map(s=>s.name)].filter(Boolean).join(' · ')}</div>`:''}`).join('');
  const chg=o.paid&&o.givenAmount>0?o.givenAmount-o.total:null;
  document.getElementById('ticket-content').innerHTML=`<div class="tkt"><div class="th"><div class="ts">🧾 MA CAISSE</div><div class="td">${fd(o.time)} — ${ft(o.time)}</div><div class="td">Commande #${String(o.id).padStart(3,'0')}</div>${o.clientName?`<div class="td" style="font-weight:700;margin-top:4px">👤 ${esc(o.clientName)}</div>`:''}</div>${lh}<hr class="tsep"/><div class="tt"><span>TOTAL</span><span>${fp(o.total)}</span></div>${o.paid&&o.givenAmount>0?`<div class="tgiv"><span>Donné</span><span>${fp(o.givenAmount)}</span></div><div class="tchg"><span>Monnaie rendue</span><span>${fp(Math.max(0,chg))}</span></div>`:''}<div style="text-align:center;font-size:11px;color:#999;margin-top:6px">${o.paid?'✅ PAYÉ':'⏳ EN ATTENTE'}</div><div class="tf">Merci de votre visite !<br/>Conservez ce ticket.</div></div>`;
  om('m-ticket');
}
function doPrint(){const o=orders.find(x=>x.id===_tid);if(!o)return;if(navigator.share)navigator.share({title:'Ticket',text:document.getElementById('ticket-content').innerText}).catch(()=>{});else window.print();}

/* ═══════════ EDIT ORDER ═══════════ */
let _eid=null,_ec=[];
function openEdit(id){_eid=id;const o=orders.find(x=>x.id===id);if(!o)return;_ec=o.lines.map(l=>({...l,supps:[...(l.supps||[])],garnitures:[...(l.garnitures||[])],sauceTags:[...(l.sauceTags||[])]}));_rEdit(o);om('m-edit');}
function _eLineT(l){return(l.linePrice||l.unitTotal||0)+(l.supps||[]).reduce((s,x)=>s+x.price,0);}
let _eAddTab3='burgersec';
function _rEdit(o){
  if(!o)o=orders.find(x=>x.id===_eid);
  const tot=_ec.reduce((s,l)=>s+_eLineT(l),0);
  let h=`<div class="esec"><div class="esect">👤 Client</div><input class="si" style="width:100%" id="edit-nm" value="${esc(o.clientName||'')}" placeholder="Nom"/></div>`;
  h+=`<div class="esec"><div class="esect">➕ Ajouter un article</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">`;
  h+=Object.entries(SECS).map(([k,sec])=>`<button onclick="eSetTab('${k}')" style="padding:5px 12px;border-radius:20px;border:1.5px solid ${k===_eAddTab3?sec.color:'var(--bdr2)'};background:${k===_eAddTab3?'color-mix(in srgb,'+sec.color+' 14%,var(--bg3))':'var(--sur)'};color:${k===_eAddTab3?sec.color:'var(--txt2)'};font-size:12px;font-weight:700;cursor:pointer">${esc(sec.label)}</button>`).join('');
  h+=`</div>`;
  const curSec=SECS[_eAddTab3];
  const addItems=getSecItems(_eAddTab3);
  if(curSec.isMenuable){
    h+=`<p style="font-size:11px;color:var(--txt2);margin-bottom:8px">Prix affiché = Menu. L'article sera ajouté en mode menu.</p>`;
  }
  h+=`<div class="eagrid">${addItems.map(it=>{const p=curSec.isMenuable?(it.priceMenu||it.price||0):(it.price||0);return`<div class="eac" onclick="eAddItem('${it.id}','${_eAddTab3}',${curSec.isMenuable})"><div class="eae">${iEmoji(it.name)}</div><div class="ean">${esc(it.name)}</div><div class="eap">${fp(p)}</div></div>`;}).join('')}</div></div>`;
  h+=`<div class="esec"><div class="esect">Articles (${_ec.length})</div>`;
  _ec.forEach((ln,idx)=>{
    const it=getItemById(ln.itemId);if(!it)return;
    const sec=SECS[ln.secKey]||SECS[Object.keys(SECS)[0]];
    const ac=sec.color;const supps=D.supplements[sec.suppKey]||[];const noG=sec.suppKey==='boisson';
    const ss=supps.map(s=>`<div class="chip${(ln.supps||[]).find(x=>x.id===s.id)?' on':''}" onclick="_eSuppT(${idx},'${s.id}')" style="--ac:${ac}">${esc(s.name)}<span class="cp">+${fp(s.price)}</span></div>`).join('');
    const sg=GARNI.map(g=>`<div class="chip${(ln.garnitures||[]).includes(g)?' on':''}" onclick="_eGarniT(${idx},'${g}')" style="--ac:${ac}">${g}</div>`).join('');
    h+=`<div class="el" style="--ac:${ac}">
      <div class="elh"><div class="eln">${ln.isMenu?'<span style="font-size:9px;background:'+ac+';color:#fff;border-radius:4px;padding:1px 5px;margin-right:4px">M</span>':''}${esc(it.name)}</div>
      <div style="display:flex;align-items:center;gap:6px"><div class="elp">${fp(_eLineT(ln))}</div><button class="cdel2" onclick="_eRmLine(${idx})">✕</button></div></div>
      ${!noG?`<div class="mlbl">Garnitures</div><div class="chips">${sg}</div>
      <div class="mlbl">Sauces</div>
      <div class="sauce-wrap">
        <div class="sauce-tags-area" onclick="document.getElementById('esi-${idx}').focus()">
          ${(ln.sauceTags||[]).map((t,i)=>`<span class="sauce-tag">${esc(t)}<button class="sauce-tag-del" onclick="eRmSauceTag(${idx},${i})">×</button></span>`).join('')}
          <input class="sauce-text-in" id="esi-${idx}" placeholder="Sauces…" oninput="eSauceIn(${idx},this)" onkeydown="eSauceKD(${idx},event)"/>
        </div>
      </div>`:''}
      ${supps.length?`<div class="mlbl">Suppléments</div><div class="chips">${ss}</div>`:''}
    </div>`;
  });
  h+=`</div><div class="etot"><span class="etotl">Nouveau total</span><span class="etota">${fp(tot)}</span></div>`;
  document.getElementById('edit-content').innerHTML=h;
}
function eSetTab(k){_eAddTab3=k;_rEdit();}
function eAddItem(id,secKey,isMenu){
  const it=getItemById(id);if(!it)return;
  const base=isMenu?(it.priceMenu||it.price||0):(it.price||0);
  _ec.push({lineKey:uid(),itemId:id,secKey,isMenu,linePrice:base,sauceTags:[],supps:[],garnitures:[],itemName:it.name,unitTotal:base});_rEdit();
}
function _eSuppT(idx,sid){const ln=_ec[idx];if(!ln)return;const sec=SECS[ln.secKey]||SECS[Object.keys(SECS)[0]];const s=(D.supplements[sec.suppKey]||[]).find(x=>x.id===sid);if(!s)return;const has=(ln.supps||[]).find(x=>x.id===sid);ln.supps=has?(ln.supps||[]).filter(x=>x.id!==sid):[...(ln.supps||[]),s];_rEdit();}
function _eGarniT(idx,g){const ln=_ec[idx];if(!ln)return;const gar=ln.garnitures||[];ln.garnitures=gar.includes(g)?gar.filter(x=>x!==g):[...gar,g];_rEdit();}
function eSauceIn(idx,inp){const v=inp.value;if(v.endsWith(',')&&v.trim().length>1){const tag=v.slice(0,v.lastIndexOf(',')).trim();if(tag&&_ec[idx]){if(!_ec[idx].sauceTags)_ec[idx].sauceTags=[];if(!_ec[idx].sauceTags.includes(tag))_ec[idx].sauceTags.push(tag);}inp.value='';_rEdit();}}
function eSauceKD(idx,e){const ln=_ec[idx];if(!ln)return;if((e.key==='Enter'||e.key===','||e.key===';')&&e.target.value.trim()){e.preventDefault();if(!ln.sauceTags)ln.sauceTags=[];const v=e.target.value.trim();if(!ln.sauceTags.includes(v))ln.sauceTags.push(v);e.target.value='';_rEdit();}if(e.key==='Backspace'&&!e.target.value&&(ln.sauceTags||[]).length){ln.sauceTags.pop();_rEdit();}}
function eRmSauceTag(idx,i){if(_ec[idx]&&_ec[idx].sauceTags)_ec[idx].sauceTags.splice(i,1);_rEdit();}
function _eRmLine(idx){_ec.splice(idx,1);_rEdit();}
function saveEdit(){
  const o=orders.find(x=>x.id===_eid);if(!o)return;
  const ni=document.getElementById('edit-nm');if(ni)o.clientName=ni.value.trim();
  o.lines=_ec.map(l=>({...l,itemName:getItemById(l.itemId)?.name||l.itemName,unitTotal:_eLineT(l)}));
  o.total=_ec.reduce((s,l)=>s+_eLineT(l),0);
  saveO();cm('m-edit');rJournal();
}

/* ═══════════ CALCULATOR ═══════════ */
let _cOid=null,_cFromM=false,_cDue=0,_cIn='0';
function openCalc(id,fromMenu){_cOid=id;_cFromM=fromMenu;_cIn='0';_cDue=fromMenu?cartT():(orders.find(x=>x.id===id)||{total:0}).total;document.getElementById('c-due').textContent='À encaisser : '+fp(_cDue);document.getElementById('c-disp').textContent='0';document.getElementById('c-chg').innerHTML='';om('m-calc');}
function ck(k){if(k==='del')_cIn=_cIn.length>1?_cIn.slice(0,-1):'0';else if(k==='.')_cIn.includes('.')||(_cIn+='.');else{if(_cIn==='0')_cIn=k;else if(_cIn.length<10)_cIn+=k;}document.getElementById('c-disp').textContent=_cIn;_updChg();}
function setBill(v){_cIn=String(v);document.getElementById('c-disp').textContent=_cIn;_updChg();}
function doCB(){_cIn=_cDue.toFixed(2);document.getElementById('c-disp').textContent=_cIn;_updChg();}
function doAppoint(){_cIn=_cDue.toFixed(2);document.getElementById('c-disp').textContent=_cIn;_updChg();}
function _updChg(){const g=parseFloat(_cIn)||0,chg=g-_cDue;const el=document.getElementById('c-chg');if(g===0){el.innerHTML='';return;}el.innerHTML=chg>=0?`<div class="cchg pos"><div class="cchl">Monnaie à rendre</div><div class="cchv">${fp(chg)}</div></div>`:`<div class="cchg neg"><div class="cchl">Manque</div><div class="cchv">-${fp(Math.abs(chg))}</div></div>`;}
function doPayConfirm(){const g=parseFloat(_cIn)||0;if(g>0&&g<_cDue&&!confirm(`Montant insuffisant (${fp(g)} / ${fp(_cDue)}). Valider ?`))return;cm('m-calc');if(_cFromM)doOrder(true,g);else{const o=orders.find(x=>x.id===_cOid);if(o){o.paid=true;o.givenAmount=g;saveO();rJournal();}}}
